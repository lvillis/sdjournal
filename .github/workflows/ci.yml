name: ci

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.96.0

jobs:
  checks:
    name: checks
    runs-on: ubuntu-24.04
    env:
      SDJOURNAL_TEST_USE_SUDO: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.96.0)
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml', 'rust-toolchain.toml', 'fuzz/Cargo.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Install CI tools
        run: |
          if ! command -v just >/dev/null; then
            cargo install just --locked
          fi
          if ! command -v cargo-nextest >/dev/null; then
            cargo install cargo-nextest --locked
          fi

      - name: Print systemd version
        run: systemd --version

      - name: Run just ci
        run: just --justfile .justfile ci

  features:
    name: features
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.96.0)
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml', 'rust-toolchain.toml', 'fuzz/Cargo.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: cargo clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

      - name: cargo test (no default features, lib)
        run: cargo test --lib --no-default-features

      - name: cargo check (no default features + tokio)
        run: cargo check --no-default-features --features tokio

      - name: cargo check (no default features + verify-seal)
        run: cargo check --no-default-features --features verify-seal

      - name: cargo check (fuzz harnesses)
        run: cargo check --manifest-path fuzz/Cargo.toml

  golden:
    name: golden (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    env:
      SDJOURNAL_TEST_STRICT: "1"
      SDJOURNAL_TEST_USE_SUDO: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.96.0)
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.toml', 'rust-toolchain.toml', 'fuzz/Cargo.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Print systemd version
        run: systemd --version

      - name: cargo test (golden strict)
        run: |
          cargo test --all-features --test golden_journalctl
