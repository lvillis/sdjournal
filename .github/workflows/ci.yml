name: ci

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: checks
    runs-on: ubuntu-24.04
    env:
      SDJOURNAL_TEST_USE_SUDO: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.94.1)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Install CI tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-1.94.1

      - name: Print systemd version
        run: systemd --version

      - name: Run just ci
        run: just --justfile .justfile ci

  features:
    name: features
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.94.1)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-1.94.1

      - name: cargo clippy (no default features)
        run: cargo clippy --all-targets --no-default-features --locked -- -D warnings

      - name: cargo test (no default features, lib)
        run: cargo test --lib --no-default-features --locked

      - name: cargo check (no default features + tokio)
        run: cargo check --no-default-features --features tokio --locked

      - name: cargo check (no default features + verify-seal)
        run: cargo check --no-default-features --features verify-seal --locked

      - name: cargo check (fuzz harnesses)
        run: cargo check --manifest-path fuzz/Cargo.toml --locked

  golden:
    name: golden (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    env:
      SDJOURNAL_TEST_STRICT: "1"
      SDJOURNAL_TEST_USE_SUDO: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (1.94.1)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-1.94.1

      - name: Print systemd version
        run: systemd --version

      - name: cargo test (golden strict)
        env:
          CARGO_TARGET_DIR: /tmp/sdjournal-target
        run: |
          cargo test --all-features --locked --test golden_journalctl
