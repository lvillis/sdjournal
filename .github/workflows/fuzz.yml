name: fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target: [journal_open, cursor_parse]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        run: |
          rustup toolchain install nightly --profile minimal --component llvm-tools-preview

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            fuzz/target
          key: cargo-${{ runner.os }}-nightly-fuzz-${{ hashFiles('Cargo.toml', 'rust-toolchain.toml', 'fuzz/Cargo.toml', '.github/workflows/fuzz.yml') }}
          restore-keys: |
            cargo-${{ runner.os }}-nightly-fuzz-

      - name: Install cargo-fuzz
        run: |
          if ! command -v cargo-fuzz >/dev/null; then
            cargo install cargo-fuzz --locked
          fi

      - name: Run fuzz target (short)
        run: cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- -max_total_time=60
